name: Build and upload to PyPi

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published

concurrency:
  group: "${{ github.ref }}-${{ github.head_ref }}-${{ github.workflow }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash -l {0}
  

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package (binary wheel and source distribution package)
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Extract package version
        id: extract-version
        run: |
          WHEEL_FILE=$(ls dist/*.whl)
          # Extract version from wheel filename (format: griddataformats-VERSION-py3-none-any.whl)
          VERSION=$(basename "$WHEEL_FILE" | sed -n 's/griddataformats-\([^-]*\)-.*/\1/p')
          # Fallback: install wheel temporarily and get version
          if [ -z "$VERSION" ]; then
            # This is a bit dirty; running in a virtual environment would be cleaner.
            # (pip install only works because our package's dependencies are easy to install.)
            python -m pip install --upgrade pip
            pip install "$WHEEL_FILE" --quiet
            VERSION=$(python -c "import gridData; print(gridData.__version__)")
            pip uninstall -y griddataformats --quiet
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Upload dist files
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist/
          retention-days: 1

  test-pytest:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download dist files
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Install package with test dependencies and tests
        run: |
          python -m pip install --upgrade pip
          WHEEL_FILE=$(ls dist/*.whl)
          pip install "$WHEEL_FILE"[test]

      - name: Test import
        run: |
          python -c "import gridData; print(f'Package {gridData.__version__} imported successfully')"
          
      - name: Run basic tests
        run: |
          pytest --verbose --pyargs gridData

  deploy-testpypi:
    name: Deploy to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, test-pytest]
    if: |
      github.repository == 'MDAnalysis/GridDataFormats' &&
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    environment:
      name: testpypi
      url: https://test.pypi.org/p/GridDataFormats
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
      - name: Download dist files
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

  deploy-pypi:
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    needs: [build, test-pytest]
    if: |
      github.repository == 'MDAnalysis/GridDataFormats' &&
      (github.event_name == 'release' && github.event.action == 'published')
    environment:
      name: pypi
      url: https://pypi.org/p/GridDataFormats
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
      - name: Download dist files
        uses: actions/download-artifact@v8
        with:
          name: dist-files
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0

  test-deployed-testpypi:
    name: Test deployed package (TestPyPI)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    needs: [build, deploy-testpypi]
    if: |
      github.repository == 'MDAnalysis/GridDataFormats' &&
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Checkout repository for actions
        uses: actions/checkout@v6

      - name: Wait for version to be available on TestPyPI (30 seconds)
        run: sleep 30
        
      - name: Install from TestPyPI
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "GridDataFormats[test]==${{ needs.build.outputs.version }}"

      - name: Test import
        run: |
          python -c "import gridData; print(f'Package {gridData.__version__} imported successfully from TestPyPi')"

      - name: Run basic tests
        run: |
          pytest --verbose --pyargs gridData

  test-deployed-pypi:
    name: Test deployed package (PyPI)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    needs: [build, deploy-pypi]
    if: |
      github.repository == 'MDAnalysis/GridDataFormats' &&
      (github.event_name == 'release' && github.event.action == 'published')
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Checkout repository for actions
        uses: actions/checkout@v6

      - name: Wait for version to be available on PyPI (30 seconds)
        run: sleep 30
        
      - name: Install from PyPI
        run: |
          python -m pip install --upgrade pip
          pip install "GridDataFormats[test]==${{ needs.build.outputs.version }}"

      - name: Test import
        run: |
          python -c "import gridData; print(f'Package {gridData.__version__} imported successfully from PyPi')"

      - name: Run basic tests
        run: |
          pytest --verbose --pyargs gridData
